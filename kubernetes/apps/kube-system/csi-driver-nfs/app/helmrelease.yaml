---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: csi-driver-nfs
spec:
  chartRef:
    kind: OCIRepository
    name: csi-driver-nfs
  interval: 1h
  values:
    storageClass:
      create: true
      - name: nfs-movies
        parameters:
          server: ricey.hm.banta.io
          share: /mnt/ricey/movies
        mountOptions:
          - nfsvers=4.2
          - nconnect=16
          - hard
          - noatime
        reclaimPolicy: Delete
        volumeBindingMode: Immediate
      - name: nfs-music
        parameters:
          server: ricey.hm.banta.io
          share: /mnt/ricey/music
        mountOptions:
          - nfsvers=4.2
          - nconnect=16
          - hard
          - noatime
        reclaimPolicy: Delete
        volumeBindingMode: Immediate
      - name: nfs-tv
        parameters:
          server: ricey.hm.banta.io
          share: /mnt/ricey/tv
        mountOptions:
          - nfsvers=4.2
          - nconnect=16
          - hard
          - noatime
        reclaimPolicy: Delete
        volumeBindingMode: Immediate
